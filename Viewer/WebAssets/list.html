<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>File List</title>
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <div id="header" class="header">
    <span id="headerPath" class="header-path"></span>
    <div class="header-tools">
      <button id="sortBtn" class="tool-btn" title="並び替え">&#8645; 並び替え</button>
      <button id="iconSizeBtn" class="tool-btn" title="アイコンサイズ">&#128269; サイズ</button>
    </div>
  </div>

  <!-- ソート選択ポップアップ -->
  <div id="sortPopup" class="popup hidden">
    <div class="popup-item" data-sort="name_asc">名前 昇順</div>
    <div class="popup-item" data-sort="name_desc">名前 降順</div>
    <div class="popup-item" data-sort="date_asc">更新日時 昇順</div>
    <div class="popup-item" data-sort="date_desc">更新日時 降順</div>
  </div>

  <!-- アイコンサイズ調整ポップアップ -->
  <div id="iconSizePopup" class="popup hidden">
    <div class="popup-title">アイコンサイズ</div>
    <div class="size-row">
      <input type="range" id="iconSizeRange" min="60" max="320" step="4" />
      <input type="number" id="iconSizeNum" min="40" max="400" step="4" />
      <span class="size-unit">px</span>
    </div>
  </div>

  <div id="iconGrid" class="icon-grid" tabindex="0"></div>
  <div id="spinner" class="spinner hidden"><div class="ring"></div><div class="spinner-label">読み込み中…</div></div>

  <!-- 流用モジュール（仕様 §1.3 / §8） -->
  <script src="shortcuts-catalog.js"></script>
  <script src="shortcut-dispatch.js"></script>
  <script src="file-list.js"></script>
  <!-- このペイン固有のグルー -->
  <script src="list-glue.js"></script>
</body>
</html>
