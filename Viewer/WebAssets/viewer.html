<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Viewer</title>
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>
  <div id="stage" class="stage"></div>
  <div id="overlay" class="overlay hidden"></div>
  <div id="hint" class="hint"></div>
  <!-- 表示メニュー（左上・半透明・マウス移動時のみ表示）。元メインウィンドウのメニュー項目 -->
  <button id="layoutBtn" class="layout-btn" title="表示メニュー">&#9638;</button>

  <!-- 表示枚数の増減（レイアウトボタンの下に縦並び：＋ → −・半透明・マウス移動時のみ表示） -->
  <div id="countControls" class="count-controls">
    <button id="countInc" class="count-btn" title="表示枚数を増やす">&#43;</button>
    <button id="countDec" class="count-btn" title="表示枚数を減らす">&#8722;</button>
  </div>
  <div id="layoutMenu" class="layout-menu hidden">
    <div class="lm-section">レイアウト方式</div>
    <div class="lm-item" data-act="layout" data-val="layout1"><span class="lm-check">&#10003;</span>レイアウト1（縦を充填）</div>
    <div class="lm-item" data-act="layout" data-val="layout2"><span class="lm-check">&#10003;</span>レイアウト2（均一高さ）</div>
    <div class="lm-item" data-act="layout" data-val="layout3"><span class="lm-check">&#10003;</span>レイアウト3（長尺方向を充填）</div>
    <div class="lm-sep"></div>
    <div class="lm-section">読み方向</div>
    <div class="lm-item" data-act="rtl" data-val="rtl"><span class="lm-check">&#10003;</span>右&#8594;左（漫画風）</div>
    <div class="lm-item" data-act="rtl" data-val="ltr"><span class="lm-check">&#10003;</span>左&#8594;右</div>
    <div class="lm-sep"></div>
    <div class="lm-item" data-act="trim"><span class="lm-check">&#10003;</span>トリミングする</div>
  </div>
  <!-- ショートカット（流用・仕様 §8） -->
  <script src="shortcuts-catalog.js"></script>
  <script src="shortcut-dispatch.js"></script>
  <script src="viewer-glue.js"></script>
</body>
</html>
