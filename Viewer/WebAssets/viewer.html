<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Viewer</title>
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>
  <div id="stage" class="stage"></div>
  <!-- 詳細ペインは画像領域を占有する（重ね表示ではない）。左端の resizer でドラッグ幅変更。 -->
  <div id="overlayResizer" class="overlay-resizer hidden"></div>
  <div id="overlay" class="overlay hidden"></div>
  <div id="hint" class="hint"></div>
  <!-- 表示メニュー（左上・半透明・マウス移動時のみ表示）。元メインウィンドウのメニュー項目 -->
  <button id="layoutBtn" class="layout-btn" title="表示メニュー">&#9638;</button>

  <!-- 表示枚数の増減（レイアウトボタンの下に縦並び：＋ → −・半透明・マウス移動時のみ表示） -->
  <div id="countControls" class="count-controls">
    <button id="countInc" class="count-btn" title="表示枚数を増やす">&#43;</button>
    <button id="countDec" class="count-btn" title="表示枚数を減らす">&#8722;</button>
  </div>
  <!-- 詳細ペインの表示ON/OFF（左ボタン群の一番下） -->
  <button id="detailBtn" class="detail-btn" title="詳細ペインの表示/非表示">&#8505;</button>
  <div id="layoutMenu" class="layout-menu hidden">
    <!-- レイアウトは layout3 固定。レイアウト選択 UI は排除（描画関数のソースは残置）。 -->
    <div class="lm-section">表示枚数</div>
    <div class="lm-slider-row">
      <input type="range" id="countRange" min="1" max="16" step="1" />
      <span id="countVal" class="lm-slider-val">1</span>
    </div>
    <div class="lm-sep"></div>
    <div class="lm-section">読み方向</div>
    <div class="lm-item" data-act="rtl" data-val="rtl"><span class="lm-check">&#10003;</span>右&#8594;左（漫画風）</div>
    <div class="lm-item" data-act="rtl" data-val="ltr"><span class="lm-check">&#10003;</span>左&#8594;右</div>
    <div class="lm-sep"></div>
    <div class="lm-section">トリミング</div>
    <div class="lm-item" data-act="trimmode" data-val="none"><span class="lm-check">&#10003;</span>トリミングしない</div>
    <div class="lm-item" data-act="trimmode" data-val="short"><span class="lm-check">&#10003;</span>短尺方向だけトリミング</div>
    <div class="lm-item" data-act="trimmode" data-val="long"><span class="lm-check">&#10003;</span>長尺方向だけトリミング</div>
    <div class="lm-item" data-act="trimmode" data-val="vertical"><span class="lm-check">&#10003;</span>縦だけトリミング</div>
    <div class="lm-item" data-act="trimmode" data-val="horizontal"><span class="lm-check">&#10003;</span>横だけトリミング</div>
    <div class="lm-item" data-act="trimmode" data-val="both"><span class="lm-check">&#10003;</span>縦横トリミング</div>
    <div class="lm-sep"></div>
    <div class="lm-section">トリミング抑制度</div>
    <div class="lm-slider-row">
      <input type="range" id="cropPenaltyRange" min="0" max="3" step="0.1" />
      <span id="cropPenaltyVal" class="lm-slider-val">0.6</span>
    </div>
  </div>
  <!-- ショートカット（流用・仕様 §8） -->
  <script src="shortcuts-catalog.js"></script>
  <script src="shortcut-dispatch.js"></script>
  <script src="viewer-glue.js"></script>
</body>
</html>
